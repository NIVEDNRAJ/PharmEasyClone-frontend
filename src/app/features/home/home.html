<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-pharm-dark">Trending Near You</h2>
    <p class="text-gray-500 text-sm mt-1">Popular in your city</p>
  </div>

  <div *ngIf="isLoading" class="flex gap-6 overflow-x-auto pb-4">
    <div *ngFor="let item of [1,2,3,4,5]" class="w-[220px] shrink-0 h-[300px] bg-white rounded-lg shadow-sm border border-gray-100 animate-pulse"></div>
  </div>

  <div *ngIf="!isLoading" class="flex gap-6 overflow-x-auto pb-6 snap-x hide-scrollbar">
    
    <div *ngFor="let product of trendingProducts" class="w-[220px] shrink-0 bg-white rounded-lg shadow-sm border border-gray-100 hover:shadow-md transition-shadow p-4 cursor-pointer relative group snap-start flex flex-col justify-between">
      
      <div>
        <div class="h-32 w-full flex items-center justify-center mb-4">
          <img [src]="product.imageUrl" [alt]="product.name" class="max-h-full object-contain mix-blend-multiply">
        </div>
        
        <h3 class="text-sm font-semibold text-pharm-dark line-clamp-2 leading-tight mb-2">
          {{ product.name }}
        </h3>
        
        <span *ngIf="product.requiresPrescription" class="inline-block px-2 py-0.5 bg-blue-50 text-blue-600 text-[10px] font-bold rounded mb-2">
          Rx Required
        </span>
      </div>

      <div class="mt-4">
        <div class="flex items-center gap-2 text-xs text-gray-500 mb-1">
          <span>MRP</span>
          <span class="line-through">₹{{ (product.bestPrice / (1 - (product.maxDiscount/100))) | number:'1.0-0' }}</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-lg font-bold text-pharm-dark">₹{{ product.bestPrice }}</span>
          <span *ngIf="product.maxDiscount > 0" class="text-xs font-bold text-red-500 bg-red-50 px-1.5 py-0.5 rounded">
            {{ product.maxDiscount }}% OFF
          </span>
        </div>
      </div>

    </div>

  </div>
</div>
